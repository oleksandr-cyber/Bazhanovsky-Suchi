<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Sushi Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Sushi Bar</h1>
    <nav>
        <a href="index.html">Головна</a>
        <a href="menu.html">Меню</a>
        <a href="#">Доставка</a>
        <a href="#">Контакти</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-text">
        <h2>Свіжі суші щодня</h2>
        <p>Замовляй найсмачніші роли у нашому суші-барі</p>
        <button>Замовити</button>
    </div>
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/60/Sushi_platter.jpg" alt="Суші">
</section>

<section class="menu">
    <h2>Популярні роли</h2>
    <div class="cards">
        <div class="card">
            <h3>Філадельфія</h3>
            <p>Лосось, сир, рис</p>
        </div>
        <div class="card">
            <h3>Каліфорнія</h3>
            <p>Краб, авокадо</p>
        </div>
        <div class="card">
            <h3>Дракон</h3>
            <p>Вугор, соус унагі</p>
        </div>
    </div>
</section>

<section class="gallery">
    <h2>Галерея</h2>
    <div class="circles">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
</section>

<footer>
    <p>© 2026 Sushi Bar</p>
</footer>

</body>
</html>
